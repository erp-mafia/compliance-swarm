name: 'compliancemaxx'
description: 'Multi-framework compliance orchestrator (OSS-license, OWASP ASVS, ISO 27001, SOC 2, GDPR) for repo and CI/CD.'
author: 'erp-mafia'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  mode:
    description: |
      review (default) — LLM-only diff review, no scanners, no Docker. ~90s.
      scan             — deterministic scanners only (Trivy/Semgrep/Checkov/Gitleaks/etc). $0, no LLM.
      audit            — both scanners + LLM agentic deep-audit, full repo. ~10min.
      pr / swarm       — deprecated aliases for scan / audit.
    required: false
    default: 'review'
  base:
    description: 'Base SHA to diff against. Defaults to PR base on pull_request events.'
    required: false
    default: ''
  config-path:
    description: 'Path to .compliance/config.yml (relative to repo root). Optional — sensible defaults apply if absent.'
    required: false
    default: '.compliance/config.yml'
  no-llm:
    description: 'Skip LLM calls even in modes that use them (review, audit).'
    required: false
    default: 'false'
  llm-provider:
    description: 'LLM provider: bedrock | anthropic.'
    required: false
    default: 'bedrock'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning.'
    required: false
    default: 'true'
  upload-dossier:
    description: 'Upload the JSON dossier as a workflow artifact.'
    required: false
    default: 'true'
  post-comment:
    description: 'Post / update a sticky PR comment with the markdown summary.'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Exit non-zero on blocking findings. Set to false for advisory-only.'
    required: false
    default: 'true'
  working-directory:
    description: 'Repo directory to scan.'
    required: false
    default: '.'

outputs:
  exit-code:
    description: '0 clean | 1 blocking findings or expired suppressions | 2 internal error.'
    value: ${{ steps.run.outputs.exit-code }}
  sarif-path:
    description: 'Absolute path to the generated SARIF file.'
    value: ${{ steps.run.outputs.sarif-path }}
  dossier-path:
    description: 'Absolute path to the JSON dossier.'
    value: ${{ steps.run.outputs.dossier-path }}
  findings-total:
    description: 'Total finding count.'
    value: ${{ steps.run.outputs.findings-total }}
  findings-blocking:
    description: 'Blocking finding count.'
    value: ${{ steps.run.outputs.findings-blocking }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Restore SBOM cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/.compliance-cache
        key: compliance-sbom-${{ hashFiles('**/package-lock.json','**/yarn.lock','**/pnpm-lock.yaml','**/requirements.txt','**/go.sum','**/Cargo.lock','**/Gemfile.lock','**/composer.lock') }}
        restore-keys: |
          compliance-sbom-

    - name: Run compliancemaxx (${{ inputs.mode }})
      id: run
      shell: bash
      env:
        RUNNER_TEMP: ${{ runner.temp }}
        COMPLIANCE_LLM_PROVIDER: ${{ inputs.llm-provider }}
        # `github.action_ref` is the ref the user wrote (e.g. "v2", a SHA, or
        # "main"). Composite actions don't always populate $GITHUB_ACTION_REF
        # so we pass it explicitly via `with:` env.
        COMPLIANCE_ACTION_REF: ${{ github.action_ref }}
      run: |
        set +e
        cd "${{ inputs.working-directory }}"
        ARGS=(run --mode "${{ inputs.mode }}" --config "${{ inputs.config-path }}")
        if [ -n "${{ inputs.base }}" ]; then
          ARGS+=(--base "${{ inputs.base }}")
        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          ARGS+=(--base "${{ github.event.pull_request.base.sha }}")
        fi
        # Only `scan` (and legacy `pr`) skip the LLM by default. review/audit
        # use it. Pass --no-llm if explicitly requested OR if mode is scan/pr.
        case "${{ inputs.mode }}" in
          scan|pr) ARGS+=(--no-llm) ;;
          *) [ "${{ inputs.no-llm }}" = "true" ] && ARGS+=(--no-llm) ;;
        esac

        # This action.yml's npm pin. Bump on each major release of the package.
        # The git tag `v2` captures THIS action.yml (with this pin), so consumers
        # using `uses: erp-mafia/compliancemaxx@v2` get the v2 npm major. When
        # we cut v3, action.yml here will pin to ^3.0.0 and the v3 git tag will
        # capture that — leaving v2 consumers unaffected.
        ACTION_NPM_PIN="^2.0.0"

        # If user pinned to a specific version-like tag (e.g. compliancemaxx@v2.0.5
        # via uses: ...@v2.0.5), respect that exact pin. Otherwise honour the
        # action.yml's major-version pin above.
        REF="${COMPLIANCE_ACTION_REF:-}"
        case "$REF" in
          v[0-9]*.[0-9]*.[0-9]*) PKG_SPEC="compliancemaxx@${REF#v}" ;;  # exact version
          *)                     PKG_SPEC="compliancemaxx@${ACTION_NPM_PIN}" ;;
        esac
        echo "Using $PKG_SPEC (action ref: ${REF:-<none>})"

        npx -y "$PKG_SPEC" "${ARGS[@]}"
        EXIT=$?

        echo "exit-code=$EXIT" >> "$GITHUB_OUTPUT"
        echo "sarif-path=$PWD/compliance.sarif" >> "$GITHUB_OUTPUT"
        echo "dossier-path=$PWD/compliance-dossier.json" >> "$GITHUB_OUTPUT"

        if [ -f compliance-dossier.json ]; then
          TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('compliance-dossier.json','utf8')).summary.total)")
          BLOCKING=$(node -e "console.log(JSON.parse(require('fs').readFileSync('compliance-dossier.json','utf8')).summary.blocking)")
          echo "findings-total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "findings-blocking=$BLOCKING" >> "$GITHUB_OUTPUT"
        fi

        # Surface exit code without failing the step here — the final step decides.
        exit 0

    - name: Upload SARIF to Code Scanning
      if: ${{ inputs.upload-sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.run.outputs.sarif-path }}
        category: compliancemaxx
      continue-on-error: true

    - name: Upload dossier artifact
      if: ${{ inputs.upload-dossier == 'true' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: compliance-dossier-${{ inputs.mode }}-${{ github.run_attempt }}
        path: |
          ${{ steps.run.outputs.dossier-path }}
          ${{ steps.run.outputs.sarif-path }}
        retention-days: ${{ inputs.mode == 'swarm' && 90 || 14 }}

    - name: Post sticky PR comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' && always() }}
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        path: ${{ inputs.working-directory }}/compliance-comment.md
        header: compliancemaxx-${{ inputs.mode }}
      continue-on-error: true

    - name: Enforce exit code
      if: ${{ inputs.fail-on-findings == 'true' }}
      shell: bash
      run: |
        EXIT=${{ steps.run.outputs.exit-code }}
        if [ "$EXIT" != "0" ]; then
          echo "::error::compliancemaxx exited with code $EXIT (${{ steps.run.outputs.findings-blocking }} blocking finding(s))"
          exit "$EXIT"
        fi
