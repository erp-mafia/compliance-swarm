# Nightly + on-demand full hybrid audit (LLM deep-dive enabled).
# Drop this file into .github/workflows/.

name: compliance — full swarm

on:
  schedule:
    - cron: '0 2 * * *'        # 02:00 UTC nightly
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write             # OIDC for AWS Bedrock

jobs:
  swarm:
    name: Full hybrid audit
    if: |
      github.event_name != 'pull_request'
      || github.event.label.name == 'compliance:full-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        if: vars.COMPLIANCE_BEDROCK_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.COMPLIANCE_BEDROCK_ROLE_ARN }}
          aws-region: ${{ vars.COMPLIANCE_AWS_REGION || 'eu-north-1' }}

      - uses: erp-mafia/compliance-swarm@v1
        with:
          mode: swarm
          # llm-provider: bedrock      # default; set to "anthropic" + ANTHROPIC_API_KEY secret to use direct API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
