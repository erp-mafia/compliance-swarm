# Skill manifest for SOC 2 (AICPA TSP Section 100, 2017 rev. 2022).
# Common Criteria CC1-CC9; optional categories enabled per config.

id: soc2-cicd-compliance
version: 1.0.0
description: SOC 2 Trust Services Criteria audit via deterministic + agentic checks.

detection:
  always_applicable: true
  paths:
    - "**/*.tf"
    - "**/*.yaml"
    - "**/*.yml"
    - "Dockerfile*"
    - ".github/workflows/**"
    - ".gitlab-ci.yml"
    - ".compliance/**"

consumes: ["sbom"]

static_scan:
  - id: checkov-soc2
    tool: docker
    image: bridgecrew/checkov:latest
    args:
      - "-d"
      - "${REPO}"
      - "-o"
      - "json"
      - "--framework"
      - "terraform,kubernetes,dockerfile,github_actions"
      - "--soft-fail"
      - "--quiet"
    parser: checkov
    timeout_seconds: 240
    pr_mode_enabled: true

  - id: trivy-fs
    tool: docker
    image: aquasec/trivy:latest
    args:
      - "fs"
      - "--format"
      - "json"
      - "--output"
      - "${OUT}"
      - "--scanners"
      - "vuln,secret,misconfig"
      - "--severity"
      - "HIGH,CRITICAL"
      - "${REPO}"
    parser: trivy
    timeout_seconds: 240
    pr_mode_enabled: true

  - id: gitleaks
    tool: docker
    image: zricethezav/gitleaks:latest
    args: ["detect", "--source", "${REPO}", "--report-format", "json", "--report-path", "${OUT}", "--no-git"]
    parser: gitleaks
    timeout_seconds: 120
    pr_mode_enabled: true

  - id: opa-conftest
    tool: docker
    image: openpolicyagent/conftest:latest
    args:
      - "test"
      - "--output"
      - "sarif"
      - "--policy"
      - "${REPO}/.compliance/opa"
      - "${REPO}"
    parser: sarif
    timeout_seconds: 120
    pr_mode_enabled: true
    failure_action: warn

deep_audit:
  - id: cc1-cc5-policy-extraction
    prompt_file: references/common-criteria.md
    section: "CC1"
    inputs:
      - ".compliance/Information_Security_Policy.md"
      - ".compliance/CODE_OF_CONDUCT.md"
      - ".compliance/Risk_Register.md"

  - id: cc6-logical-access
    prompt_file: references/common-criteria.md
    section: "CC6"
    inputs:
      - ".compliance/Access_Control_Policy.md"
      - "**/auth/**"
      - "**/middleware/**"

  - id: cc8-change-management
    prompt_file: references/common-criteria.md
    section: "CC8"
    inputs:
      - ".compliance/Change_Management_SDLC.md"
      - ".github/workflows/**"
      - "CODEOWNERS"

  - id: cc9-vendor-risk
    prompt_file: references/common-criteria.md
    section: "CC9"
    inputs:
      - ".compliance/Vendor_Management_Policy.md"
      - sbom

finding_extraction:
  framework: soc-2
  default_severity_mapping:
    CRITICAL: critical
    HIGH: high
    MEDIUM: medium
    LOW: low
  cross_framework:
    - { tag: "NIST 800-53", control: "AC-2" }
    - { tag: "NIST 800-53", control: "CM-2" }
    - { tag: "ISO 27001:2022", control: "A.5.1" }
    - { tag: "ISO 27001:2022", control: "A.8.5" }
    - { tag: "ISO 27001:2022", control: "A.8.32" }
    - { tag: "CIS v8", control: "3" }
    - { tag: "CIS v8", control: "16" }

suppression:
  config_file: null
  inline_pragma: "checkov:skip="

out_of_repo:
  - "Physical controls (CC6.4, CC6.5)"
  - "HR offboarding completion (CC6.2) — verify SSO revocation only"
  - "Audit log streaming completeness — runtime CSPM required"
  - "Tertiary SaaS access revocation outside IdP coverage"
